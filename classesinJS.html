<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>classes in js</title>
</head>
<body>
    <h1>Classes in JavaScript</h1>
    <script>
        class Animal{
            type="Mammal";
            sound(){
                console.log("Generic sound");
            }
        }

        let obj = new Animal();
        console.log(obj.type); 
       obj.sound();

      //constructor
      class Dog{
        constructor(){
            this.breed="Golden Retriever";

        }

        sound(){
            console.log("Woof!");
        }
      }

      const d1 = new Dog();
      console.log(d1.breed);
        d1.sound();

        //constructor with parameters
        class Bike{
            constructor(model,year){
                this.model=model;
                this.year=year;
            }
            display(){
                console.log(`${this.model} was launched in the year ${this.year}`);
            }
        }

       let b1= new Bike("Honda", 2021).display();
       let b2= new Bike("Yamaha", 2020).display();

       


        


        
    </script>
</body>
</html>
